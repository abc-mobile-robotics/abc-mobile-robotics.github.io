yolo_detector:
  ros__parameters:
    image_topic: /camera/image_raw
    model_path: best.pt
    labels: [wolf, rabbit, carrot]
    confidence_threshold: 0.5
    image_width_px: 640.0
    focal_length_px: 600.0
    target_width_map.wolf: 0.18
    target_width_map.rabbit: 0.18
    target_width_map.carrot: 0.10

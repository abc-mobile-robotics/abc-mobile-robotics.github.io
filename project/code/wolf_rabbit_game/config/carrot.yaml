carrot_manager:
  ros__parameters:
    rabbit_odom_topic: "/rabbit/odom"
    carrot_state_topic: "/game/carrot_state"
    game_state_topic: "/game/state"

    timer_period: 0.1
    eat_distance: 0.25
    respawn_delay: 2.0
    min_spawn_distance_to_rabbit: 0.8
    spawn_margin: 0.35
    spawn_outside_wolf_territory: false
    random_seed: 42

    arena_min_x: -4.0
    arena_max_x: 4.0
    arena_min_y: -4.0
    arena_max_y: 4.0

    wolf_min_x: -1.5
    wolf_max_x: 1.5
    wolf_min_y: -1.5
    wolf_max_y: 1.5